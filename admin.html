<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Admin Dashboard</title>
    <style>
        :root {
            --primary-brown: #4B3621;
            --white: #FFFFFF;
            --light-gray: #f4f4f4;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light-gray); }

        /* Header */
        header { 
            background: var(--primary-brown); 
            color: var(--white); 
            padding: 1rem 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .menu-container { position: relative; cursor: pointer; }
        .dropdown { 
            display: none; position: absolute; right: 0; background: var(--white); 
            color: var(--primary-brown); padding: 10px; border-radius: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }

        /* Dashboard */
        .hero { padding: 2rem; background: var(--white); margin: 20px; border-radius: 8px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { background: var(--primary-brown); color: var(--white); padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: var(--white); padding: 2rem; border-radius: 8px; width: 400px; }
    </style>
</head>
<body>

<header>
    <div class="logo">LOGO</div>
    <div id="datetime">Loading time...</div>
    <div class="menu-container" onclick="toggleDropdown()">
        ☰ 
        <div id="adminDropdown" class="dropdown">
            <div onclick="openPasswordForm()">Change Password</div>
        </div>
    </div>
</header>

<main class="hero">
    <h1>Welcome, Admin</h1>
    <div class="stats">Stats: Total Events [ 05 ] | Bookings [ 12 ]</div>
    
    <div class="btn-group">
        <button onclick="openModal('eventModal')">Add Event</button>
        <button onclick="openModal('workModal')">Add Recent Works</button>
        <button onclick="alert('Slot Bookings Overview...')">Slot Bookings</button>
    </div>
</main>

<!-- Modal for Event -->
<div id="eventModal" class="modal">
    <div class="modal-content">
        <h3>Add New Event</h3>
        <input type="file"><br><br>
        <input type="text" placeholder="Event Name"><br><br>
        <button onclick="submitForm('eventModal')">Add Event</button>
    </div>
</div>

<script>
    // Time update
    setInterval(() => document.getElementById('datetime').innerText = new Date().toLocaleString(), 1000);

    // Toggle logic
    function toggleDropdown() {
        const d = document.getElementById('adminDropdown');
        d.style.display = d.style.display === 'block' ? 'none' : 'block';
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    
    function submitForm(id) {
        document.getElementById(id).style.display = 'none';
        alert("Your event is successfully added");
    }

    function openPasswordForm() {
        const newPass = prompt("Enter New Password");
        const confirmPass = prompt("Confirm New Password");
        if(newPass === confirmPass) alert("Password Updated Successfully");
    }
</script>

</body>
</html>
